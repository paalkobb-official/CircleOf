<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circle of Fifths</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
 
  <div class="circle">
 
 
    <!-- Outer ring: diminished chords -->
    <span class="diminished" style="--angle: 0deg">B°</span>
    <span class="diminished" style="--angle: 30deg">F♯°</span>
    <span class="diminished" style="--angle: 60deg">C♯°</span>
    <span class="diminished" style="--angle: 90deg">G♯°</span>
    <span class="diminished" style="--angle: 120deg">D♯°</span>
    <span class="diminished" style="--angle: 150deg">A♯°</span>
    <span class="diminished" style="--angle: 180deg">E♯°</span>
    <span class="diminished" style="--angle: 210deg">C°</span>
    <span class="diminished" style="--angle: 240deg">G°</span>
    <span class="diminished" style="--angle: 270deg">D°</span>
    <span class="diminished" style="--angle: 300deg">A°</span>
    <span class="diminished" style="--angle: 330deg">E°</span>
 
    <!-- Middle ring: relative minors -->
    <span class="minor" style="--angle: 0deg">Am</span>
    <span class="minor" style="--angle: 30deg">Em</span>
    <span class="minor" style="--angle: 60deg">Bm</span>
    <span class="minor" style="--angle: 90deg">F♯m</span>
    <span class="minor" style="--angle: 120deg">C♯m</span>
    <span class="minor" style="--angle: 150deg">G♯m</span>
    <span class="minor" style="--angle: 180deg">D♯m</span>
    <span class="minor" style="--angle: 210deg">B♭m</span>
    <span class="minor" style="--angle: 240deg">Fm</span>
    <span class="minor" style="--angle: 270deg">Cm</span>
    <span class="minor" style="--angle: 300deg">Gm</span>
    <span class="minor" style="--angle: 330deg">Dm</span>
 
    <!-- Inner ring: major notes -->
    <span class="note" style="--angle: 0deg">C</span>
    <span class="note" style="--angle: 30deg">G</span>
    <span class="note" style="--angle: 60deg">D</span>
    <span class="note" style="--angle: 90deg">A</span>
    <span class="note" style="--angle: 120deg">E</span>
    <span class="note" style="--angle: 150deg">B</span>
    <span class="note" style="--angle: 180deg">F♯</span>
    <span class="note" style="--angle: 210deg">D♭</span>
    <span class="note" style="--angle: 240deg">A♭</span>
    <span class="note" style="--angle: 270deg">E♭</span>
    <span class="note" style="--angle: 300deg">B♭</span>
    <span class="note" style="--angle: 330deg">F</span>
 
  </div>
 
</body>
</html>
